# Please refer https://aka.ms/HTTPSinContainer on how to setup an https developer certificate for your ASP.NET Core service.

services:
  acaapprazorweb:
    image: acaapprazorweb
    build:
      context: .
      dockerfile: AcaApp.RazorWeb/Dockerfile
    ports:
      - 5229:5229
    environment:
      - WeatherApiUrl=http://acaappwebapi:5174
  acaappwebapi:
    image: acaappwebapi
    build:
      context: .
      dockerfile: AcaApp.WebApi/Dockerfile
    ports:
      - 5174:5174
